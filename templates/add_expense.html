<style>

.category-grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:18px;
}

.cat-item{
text-align:center;
padding:14px;
border-radius:12px;
background:rgba(255,255,255,0.1);
cursor:pointer;
transition:0.3s;
}

.cat-item input{
display:none;
}

.cat-item .material-icons{
font-size:36px;
color:white;
display:block;
margin-bottom:5px;
}

.cat-item p{
color:white;
font-size:13px;
}

.cat-item:hover{
background:rgba(255,255,255,0.25);
transform:scale(1.05);
}

.cat-item input:checked + .material-icons{
color:#ff4d4d;
}
