{% extends 'base.html' %}
{% block content %}

<h2 class="text-white mb-4">👤 My Profile</h2>

<div class="glass-card" style="max-width:600px;">

    <!-- VIEW MODE -->
    <div id="viewMode">

        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='profile_pics/' + current_user.profile_pic) }}"
                 width="120"
                 height="120"
                 style="border-radius:50%; object-fit:cover;">
        </div>

        <div class="mb-3 text-white">
            <strong>Name:</strong><br>
            {{ current_user.username }}
        </div>

        <div class="mb-3 text-white">
            <strong>Email:</strong><br>
            {{ current_user.email }}
        </div>

        <div class="mb-3 text-white">
            <strong>Monthly Budget:</strong><br>
            {{ current_user.budget }}
        </div>

        <button class="btn btn-light w-100 mb-3"
                onclick="toggleEdit(true)">
            ✏ Edit Profile
        </button>

    </div>

    <!-- EDIT MODE -->
    <div id="editMode" style="display:none;">

        <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="text-white">Username</label>
                <input type="text"
                       name="username"
                       value="{{ current_user.username }}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label class="text-white">Monthly Budget</label>
                <input type="number"
                       name="budget"
                       value="{{ current_user.budget }}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label class="text-white">New Password</label>
                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Leave blank to keep current password">
            </div>

            <div class="mb-3">
                <label class="text-white">Profile Picture</label>
                <input type="file"
                       name="profile_pic"
                       class="form-control">
            </div>

            <button class="btn btn-success w-100 mb-2">
                💾 Save Changes
            </button>

        </form>

        <button class="btn btn-secondary w-100 mb-3"
                onclick="toggleEdit(false)">
            Cancel
        </button>

    </div>

    <form method="POST" action="{{ url_for('delete_account') }}">
        <button class="btn btn-danger w-100">
            🗑 Delete Account
        </button>
    </form>

</div>

<script>
function toggleEdit(editing) {
    document.getElementById("viewMode").style.display = editing ? "none" : "block";
    document.getElementById("editMode").style.display = editing ? "block" : "none";
}
</script>

{% endblock %}
