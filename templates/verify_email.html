{% extends "base.html" %}

{% block content %}

<div class="container" style="max-width:500px;margin:auto;text-align:center">

<h2>Email Verification</h2>

<p>A verification code has been sent to your email.</p>

<form method="POST">

<input type="text"
       name="otp"
       placeholder="Enter OTP"
       required
       style="padding:10px;width:100%;margin-top:15px">

<button type="submit"
        style="margin-top:15px;padding:10px 20px">
        Verify Email
</button>

</form>

</div>

{% endblock %}
