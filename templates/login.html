{% extends 'base.html' %}
{% block content %}

<h3 class="text-white mb-4">Login</h3>

<div class="glass-card" style="max-width:400px;">

<form method="POST">

    <div class="mb-3">
        <input type="text"
               name="identifier"
               placeholder="Email or Username"
               class="form-control"
               required>
    </div>

    <div class="mb-3">
        <input type="password"
               name="password"
               placeholder="Password"
               class="form-control"
               required>
    </div>

    <button class="btn btn-success w-100">Login</button>

</form>

<p class="mt-3 text-white">
    Don't have an account?
    <a href="{{ url_for('register') }}">Create account</a>
</p>

</div>

{% endblock %}
